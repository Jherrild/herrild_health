- name: Methylene Blue
  detail: >
    Heavily promoted by biohackers as a nootropic and mitochondrial booster.
    The reality: nearly all cognitive claims come from cell and animal studies.
    Human evidence is preliminary, inconsistent, and often funded by interested
    parties. Methylene blue is an FDA-approved prescription drug for
    methemoglobinemia — not a supplement. "Supplement" versions are unregulated,
    vary wildly in purity, and may contain industrial contaminants. It also
    carries serious risks: serotonin syndrome if combined with SSRIs/SNRIs, and
    hemolytic anemia in people with G6PD deficiency. The hype far outpaces the
    science.

- name: BCAAs (Branched-Chain Amino Acids)
  detail: >
    If you eat enough protein (0.7+ g per lb of body weight), BCAAs are
    redundant. Your body needs all essential amino acids to build muscle — not
    just three of them. Complete protein sources (meat, eggs, whey, soy) already
    contain BCAAs in the right ratios. Supplementing BCAAs on top of adequate
    protein intake shows no additional benefit for muscle growth or recovery
    in controlled studies. Typically $25–40/month for expensive flavored water.

- name: Glutathione (oral)
  detail: >
    We recommend NAC + glycine on this site specifically because oral
    glutathione doesn't work well. Your digestive system breaks most of it
    down before absorption. Despite premium pricing ($30–60/month), oral
    glutathione supplements have poor bioavailability. The far cheaper and more
    effective approach is to give your body the precursors (NAC + glycine) and
    let it produce glutathione endogenously. Liposomal forms show slightly
    better absorption but cost 5–10x more than the precursors for marginal
    benefit.

- name: Biotin
  detail: >
    Massively marketed for hair and nail growth, but unless you have a
    diagnosed biotin deficiency (which is rare), supplementation does nothing.
    Most people get plenty from food. Worse, high-dose biotin can interfere
    with lab test results — including thyroid and cardiac panels — leading to
    false readings your doctor may not think to ask about. Cheap per pill, but
    the real cost is a misdiagnosis from skewed bloodwork.
