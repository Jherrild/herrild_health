- name: NAC (N-Acetyl Cysteine)
  dose: 0.5–1 g/day
  detail: >
    Always take with glycine (glycine buffers NAC). Combined with glycine,
    upregulates the body's natural glutathione production. Don't bother buying
    glutathione supplements directly — oral glutathione has poor bioavailability,
    and NAC + glycine are far cheaper and more effective as precursors.
    See the <a href="#faq-who-should-consider-taking-nac" onclick="document.getElementById('tab-faq').checked=true;var el=document.getElementById('faq-who-should-consider-taking-nac');el.open=true;el.scrollIntoView({behavior:'smooth'});return false;">FAQ</a>
    for who should consider adding NAC.
  warning: >
    ⚠️ NAC tastes and smells like sulfur. Most people take it in capsule form.
