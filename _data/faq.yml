- question: Do I still need melatonin if I sleep fine?
  answer: >
    Not necessarily. Melatonin supports sleep onset, but if you already sleep
    well, the other supplements (especially glycine and magnesium glycinate) still
    provide their benefits independently. You can skip the melatonin.

- question: If I take glycine, do I still need a collagen supplement?
  answer: >
    For skin health, probably not. Glycine is one of the primary amino acids in
    collagen (~33%) and upregulates collagen production and turnover — so 4+ g of
    glycine likely covers skin benefits. However, for joint health or connective
    tissue recovery, a dedicated collagen supplement at higher doses (10–15 g/day)
    may still be worthwhile. Studies using
    <a href="https://www.mdpi.com/2072-6643/15/6/1332" target="_blank">radioisotope-labeled collagen</a>
    have shown that ingested collagen peptides do appear in joint cartilage and
    connective tissue, though only a fraction of the oral dose reaches these
    sites. The effective studied range for joint benefits is 10–15 g/day of
    hydrolyzed collagen. Glycine at 4 g alone is unlikely to deliver enough
    material for significant joint tissue repair.

- question: Should I just buy glutathione directly?
  answer: >
    No. Oral glutathione has poor bioavailability — your digestive system breaks
    most of it down before it can be used. Instead, take NAC + glycine: these are
    the precursors your body uses to produce glutathione endogenously. They're
    also significantly cheaper.

- question: What do glycine and NAC taste like?
  answer: >
    Glycine is mildly sweet and nearly tasteless — it can be mixed into beverages
    like hot chocolate as a partial sugar replacement. NAC smells and tastes like
    sulfur. Most people take NAC in capsule form to avoid the taste.

- question: Can these supplements keep me awake?
  answer: >
    NAC and glycine can occasionally have paradoxical effects, causing wakefulness
    instead of sleepiness. This isn't harmful — just adjust your timing. Trial
    them at night first, and if they disrupt sleep, move them earlier in the day.
    Glycine doesn't act as a sedative; it enhances existing sleep pressure by
    causing a small drop in core body temperature.

- question: Why does it have to be magnesium glycinate specifically?
  answer: >
    Different forms of magnesium have different absorption profiles and effects.
    Magnesium glycinate is well-absorbed and less likely to cause GI issues
    (unlike magnesium oxide or citrate, which can have laxative effects). The
    glycinate form also provides a small amount of additional glycine.

- question: Is 10 g of creatine too much?
  answer: >
    For exercise performance, 3–5 g/day is sufficient — that's where muscle
    stores saturate. However, the brain absorbs creatine more slowly due to the
    blood-brain barrier, and recent cognitive studies use higher doses. A
    <a href="https://www.frontiersin.org/journals/nutrition/articles/10.3389/fnut.2024.1424972/full" target="_blank">2024 systematic review</a>
    of 16 RCTs found significant cognitive improvements at higher doses,
    especially under stress. If you're targeting cognitive wellness, the emerging
    evidence supports 10+ g. If unsure, 5 g/day is a safe starting point.
    Creatine monohydrate is the most studied form.

- question: I work night shifts — when should I take everything?
  answer: >
    Take creatine when you wake up (even if that's afternoon/evening). Glycine
    and magnesium glycinate should be taken ~1 hour before you plan to sleep,
    regardless of clock time. NAC can be taken before a shift if it causes
    wakefulness. Align supplements with your personal sleep/wake cycle, not the
    clock.

- question: Where can I buy these supplements?
  answer: >
    Specific product links are coming soon. In general, look for reputable brands
    with third-party testing. For creatine, use monohydrate (the most studied
    form). For omega-3, check that EPA and DHA amounts are listed on the label.

- question: Who should consider taking NAC?
  answer: >
    NAC is primarily recommended for adults over 40. Research shows the body's
    natural glutathione production declines with age, and GlyNAC supplementation
    (glycine + NAC) has been shown to improve cognition and reduce oxidative
    stress in older adults
    (<a href="https://link.springer.com/article/10.1007/s11357-021-00309-1" target="_blank">Sekhar et al., Baylor College of Medicine</a>).
    Younger adults probably don't need it, but can trial it if the core stack
    alone doesn't feel sufficient. Always take NAC with glycine — glycine buffers
    NAC and provides the other precursor needed for glutathione synthesis.
