- question: Do I still need melatonin if I sleep fine?
  answer: >
    Not necessarily. Melatonin supports sleep onset, but if you already sleep
    well, the other supplements (especially glycine and magnesium glycinate) still
    provide their benefits independently. You can skip the melatonin.

- question: If I take glycine, do I still need a collagen supplement?
  answer: >
    Glycine is one of the primary amino acids in collagen (~33%) and upregulates
    collagen production and turnover. It may reduce or eliminate the need for a
    separate collagen supplement, particularly for skin and joint health benefits.

- question: Should I just buy glutathione directly?
  answer: >
    No. Oral glutathione has poor bioavailability — your digestive system breaks
    most of it down before it can be used. Instead, take NAC + glycine: these are
    the precursors your body uses to produce glutathione endogenously. They're
    also significantly cheaper.

- question: What do glycine and NAC taste like?
  answer: >
    Glycine is mildly sweet and nearly tasteless — it can be mixed into beverages
    like hot chocolate as a partial sugar replacement. NAC smells and tastes like
    sulfur. Most people take NAC in capsule form to avoid the taste.

- question: Can these supplements keep me awake?
  answer: >
    NAC and glycine can occasionally have paradoxical effects, causing wakefulness
    instead of sleepiness. This isn't harmful — just adjust your timing. Trial
    them at night first, and if they disrupt sleep, move them earlier in the day.
    Glycine doesn't act as a sedative; it enhances existing sleep pressure by
    causing a small drop in core body temperature.

- question: Why does it have to be magnesium glycinate specifically?
  answer: >
    Different forms of magnesium have different absorption profiles and effects.
    Magnesium glycinate is well-absorbed and less likely to cause GI issues
    (unlike magnesium oxide or citrate, which can have laxative effects). The
    glycinate form also provides a small amount of additional glycine.

- question: Is 10 g of creatine too much?
  answer: >
    The most well-established maintenance dose in the scientific literature is
    3–5 g/day. 10 g is higher than typical recommendations but is not considered
    dangerous. Some studies exploring cognitive benefits have used higher doses.
    If you're unsure, 5 g/day is a safe and well-supported starting point.
    Creatine monohydrate is the most studied form.

- question: I work night shifts — when should I take everything?
  answer: >
    Take creatine when you wake up (even if that's afternoon/evening). Glycine
    and magnesium glycinate should be taken ~1 hour before you plan to sleep,
    regardless of clock time. NAC can be taken before a shift if it causes
    wakefulness. Align supplements with your personal sleep/wake cycle, not the
    clock.

