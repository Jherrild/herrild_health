- label: "Morning:"
  detail: Creatine, Omega-3 (first dose)

- label: "Evening:"
  detail: Omega-3 (second dose), Magnesium Glycinate, Glycine (~1 hr before bed), Melatonin (at bedtime)

- label: "NAC:"
  detail: Trial at night first. If it causes wakefulness, move to daytime. Can have paradoxical stimulating effects in some people.
